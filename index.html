<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hippo</title>
<script>try{if(localStorage.getItem('hippo-dark')==='1')document.documentElement.classList.add('dark-pre')}catch(e){}</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Hippo">
<meta name="theme-color" content="#F2EEE6">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&family=Noto+Serif+Display:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F2EEE6;--bg2:#EBE5DB;--bg3:#E3DDD3;--border:#DDD8CE;--gold:#C9A84C;--gold-dim:#A8842A;--text:#28231C;--text-dim:#60584E;--text-faint:#908878;--accent:#3B6D45}
body.dark{--bg:#1B2A3A;--bg2:#22334A;--bg3:#2A3D55;--border:#3A5068;--gold:#C9A84C;--gold-dim:#A8842A;--text:#E8E0D4;--text-dim:#A89880;--text-faint:#7A9AB8;--accent:#5A9E6A}
html.dark-pre body{--bg:#1B2A3A;--bg2:#22334A;--bg3:#2A3D55;--border:#3A5068;--gold:#C9A84C;--gold-dim:#A8842A;--text:#E8E0D4;--text-dim:#A89880;--text-faint:#7A9AB8;--accent:#5A9E6A}
body{transition:background-color .2s,color .2s}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif}
#app{display:grid;grid-template-columns:200px 1fr 340px;height:100vh}
#nav{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#nav-header{padding:0;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;min-height:80px}
#book-list{overflow-y:auto;flex:1;padding:6px 0}
.book-btn{display:block;width:100%;padding:5px 16px;background:none;border:none;color:var(--text-dim);font-size:12px;font-family:'Inter',sans-serif;text-align:left;cursor:pointer;transition:color .12s,background .12s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-btn:hover{color:var(--text);background:var(--bg3)}
.book-btn .arrow{float:right;font-size:9px;margin-top:2px;color:var(--text-faint);transition:transform .15s}
.book-btn.open .arrow{transform:rotate(90deg)}
.ch-list{display:none;flex-wrap:wrap;gap:3px;padding:4px 10px 8px 16px;background:var(--bg3)}
.ch-list.open{display:flex}
.ch-btn{width:26px;height:26px;background:var(--bg2);border:1px solid var(--border);color:var(--text-dim);font-size:10px;cursor:pointer;border-radius:3px;transition:all .12s}
.ch-btn:hover{border-color:var(--gold-dim);color:var(--text)}
.ch-btn.active{background:var(--gold);border-color:var(--gold);color:var(--bg);font-weight:600}
#main{display:flex;flex-direction:column;overflow:hidden}
#main-header{padding:12px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;background:var(--bg);flex-shrink:0;gap:12px}
#ref-display{font-family:'Noto Serif',serif;font-size:14px;color:var(--gold);letter-spacing:.03em;flex:1}
#mode-toggle{display:flex;gap:0;flex-shrink:0}
.mode-btn{padding:5px 14px;background:none;border:1px solid var(--border);color:var(--text-dim);font-size:11px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .12s;letter-spacing:.04em}
.mode-btn:first-child{border-radius:3px 0 0 3px}
.mode-btn:last-child{border-radius:0 3px 3px 0;border-left:none}
.mode-btn.active{background:var(--gold);border-color:var(--gold);color:#28231C;font-weight:500}
.mode-btn:not(.active):hover{color:var(--text);background:var(--bg3)}
#dark-toggle{background:none;border:1px solid var(--border);color:var(--text-faint);padding:5px 9px;border-radius:3px;cursor:pointer;font-size:13px;line-height:1;flex-shrink:0;transition:color .15s,border-color .15s}
#dark-toggle:hover{color:var(--text);border-color:var(--gold-dim)}
#search-wrap{display:flex;align-items:center;position:relative;flex-shrink:0}
#search-input{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 28px 6px 12px;font-size:12px;font-family:'Inter',sans-serif;border-radius:3px;width:160px;outline:none;transition:border-color .15s}
#search-input:focus{border-color:var(--gold-dim)}
#search-input::placeholder{color:var(--text-faint)}
#search-clear{display:none;position:absolute;right:6px;background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:13px;line-height:1;padding:0;width:16px;height:16px;align-items:center;justify-content:center}
#search-clear:hover{color:var(--text)}
#search-clear.visible{display:flex}
#search-results{position:absolute;top:100%;left:0;right:0;background:var(--bg);border:1px solid var(--border);border-top:none;border-radius:0 0 4px 4px;max-height:320px;overflow-y:auto;z-index:200;display:none;box-shadow:0 4px 12px rgba(0,0,0,.12)}
#search-results.open{display:block}
.sr-item{padding:8px 14px;cursor:pointer;border-bottom:1px solid var(--border)}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:var(--bg3)}
.sr-ref{font-size:11px;color:var(--gold);letter-spacing:.04em;margin-bottom:3px}
.sr-snippet{font-family:'Noto Serif',serif;font-size:13px;color:var(--text-dim);line-height:1.5}
.sr-snippet mark{background:rgba(201,168,76,.2);color:var(--gold);border-radius:2px;padding:0 2px}
.sr-none{padding:12px 14px;color:var(--text-faint);font-size:12px}
#reading-pane{flex:1;overflow-y:auto;padding:28px 44px 64px}
.chapter-title{font-family:'Noto Serif Display',serif;font-size:13px;text-transform:uppercase;letter-spacing:.18em;color:var(--text-faint);margin-bottom:24px}
.latin-heading{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--gold-dim);margin-bottom:6px;font-family:'Inter',sans-serif}
.latin-text{font-family:'Noto Serif',serif;font-size:13px;color:var(--text-faint);line-height:1.75;font-style:italic;margin-bottom:16px;padding:10px 14px;background:var(--bg2);border-left:2px solid var(--border);border-radius:0 3px 3px 0}
.para{font-family:'Noto Serif',serif;font-size:17px;line-height:1.9;color:var(--text);margin-bottom:20px}
.para-num{font-size:10px;color:var(--text-faint);font-variant-numeric:tabular-nums;margin-right:8px;flex-shrink:0;padding-top:4px;font-family:'Inter',sans-serif}
.ew{display:inline;border-radius:2px;padding:0 1px;cursor:pointer;transition:color .1s,background .1s}
.ew:hover{color:var(--gold);background:rgba(201,168,76,.1)}
.ew.selected{color:var(--bg) !important;background:var(--gold) !important}
.interlinear-para{display:flex;flex-wrap:wrap;gap:4px 12px;align-items:flex-end;margin-bottom:24px;font-family:'Noto Serif',serif}
.iw{display:inline-flex;flex-direction:column;align-items:center;cursor:pointer;border-radius:3px;padding:3px 4px;transition:background .1s}
.iw:hover{background:rgba(201,168,76,.1)}
.iw.selected{background:var(--gold)}
.iw.selected .iw-eng{color:var(--bg)}
.iw.selected .iw-lat{color:var(--bg);opacity:.8}
.iw-eng{font-size:16px;color:var(--text);line-height:1.4;text-align:center}
.iw-lat{font-size:10px;color:var(--gold);font-style:italic;letter-spacing:.03em;text-align:center;margin-top:2px;min-height:14px}
.iw-no-lat .iw-lat{color:var(--text-faint);opacity:.4}
.interlinear-para .para-num{font-size:10px;color:var(--text-faint);font-variant-numeric:tabular-nums;font-family:'Inter',sans-serif;align-self:flex-end;padding-bottom:6px}
#chapter-nav{display:flex;justify-content:space-between;align-items:center;padding:24px 0 8px;border-top:1px solid var(--border);margin-top:16px}
.ch-nav-btn{background:none;border:1px solid var(--border);color:var(--text-dim);padding:10px 20px;border-radius:3px;cursor:pointer;font-size:13px;font-family:'Inter',sans-serif;min-width:44px;min-height:44px;transition:color .15s,border-color .15s;display:flex;align-items:center;gap:6px}
.ch-nav-btn:hover:not(:disabled){color:var(--text);border-color:var(--gold-dim)}
.ch-nav-btn:disabled{opacity:.3;cursor:default}
.ch-nav-btn svg{width:7px;height:13px;stroke:currentColor;stroke-width:2;fill:none;flex-shrink:0}
#detail{background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#detail-inner{flex:1;overflow-y:auto}
#detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-faint);font-size:12px;gap:12px;padding:32px;text-align:center;line-height:1.6}
.empty-lat{font-family:'Noto Serif Display',serif;font-size:42px;color:var(--border);font-weight:300;font-style:italic}
#word-hero{padding:24px 22px 18px;background:var(--bg3);border-bottom:1px solid var(--border)}
#hero-eng{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-faint);margin-bottom:10px}
#hero-lat{font-family:'Noto Serif Display',serif;font-size:42px;font-weight:300;color:var(--gold);line-height:1.1;font-style:italic}
#hero-pos{font-size:10px;color:var(--gold-dim);margin-top:5px;letter-spacing:.05em;text-transform:uppercase}
.dsec{padding:14px 22px;border-bottom:1px solid var(--border)}
.dsec:last-child{border-bottom:none}
.dlabel{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-faint);margin-bottom:8px}
.dcontent{font-size:13px;color:var(--text);line-height:1.65}
.dcontent.def{font-family:'Noto Serif',serif;font-size:14px;line-height:1.75}
#detail-handle{display:none}
#detail-close{display:none}
#credits{font-size:10px;color:var(--text-faint);padding:10px 16px;border-top:1px solid var(--border);line-height:1.5;flex-shrink:0}
#credits a{color:var(--gold-dim);text-decoration:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@media (max-width:768px){
  #app{grid-template-columns:1fr;grid-template-rows:auto 1fr;height:100vh;position:relative}
  #nav{position:fixed;top:0;left:0;bottom:0;width:280px;z-index:100;transform:translateX(-100%);transition:transform .25s ease;box-shadow:4px 0 20px rgba(0,0,0,.15)}
  #nav.open{transform:translateX(0)}
  #nav-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
  #nav-overlay.open{display:block}
  #detail{position:fixed;bottom:0;left:0;right:0;height:55vh;z-index:98;border-left:none;border-top:1px solid var(--border);transform:translateY(100%);transition:transform .25s ease;border-radius:16px 16px 0 0}
  #detail.open{transform:translateY(0)}
  #detail-handle{display:block;width:40px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;flex-shrink:0}
  #detail-close{display:block;position:absolute;top:10px;right:12px;background:none;border:none;color:var(--text-faint);font-size:16px;cursor:pointer;padding:4px 8px;line-height:1}
  #main{grid-column:1;grid-row:1/-1}
  #main-header{padding:10px 14px;gap:8px}
  #hamburger{display:flex;align-items:center;justify-content:center;width:36px;height:36px;background:none;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0}
  #hamburger span{display:block;width:16px;height:1.5px;background:var(--text);box-shadow:0 5px 0 var(--text),0 -5px 0 var(--text)}
  #reading-pane{padding:16px 18px 120px}
  .para{font-size:16px}
  #dark-toggle{margin-right:6px}
  #search-input{width:110px}
  .mode-btn{padding:5px 8px;font-size:10px}
  .iw-eng{font-size:14px}
}
@media (min-width:769px){
  #hamburger{display:none}
  #nav-overlay{display:none !important}
}
</style>
</head>
<body>
<div id="app">
  <nav id="nav">
    <div id="nav-header" title="Hippo — Augustine's Confessions">
      <svg width="160" height="70" viewBox="0 0 260 100" xmlns="http://www.w3.org/2000/svg">
        <text x="130" y="42" font-family="Georgia,'Noto Serif',serif" font-size="38" letter-spacing=".18em" text-anchor="middle" fill="var(--gold)" font-weight="400">HIPPO</text>
        <text x="130" y="62" font-family="Georgia,serif" font-size="11" text-anchor="middle" fill="var(--text-faint)" letter-spacing=".22em">AUGUSTINE · CONFESSIONS</text>
        <line x1="30" y1="72" x2="230" y2="72" stroke="var(--border)" stroke-width="1"/>
      </svg>
    </div>
    <div id="book-list"></div>
    <div id="credits">
      Lexicon: <a href="https://www.perseus.tufts.edu/" target="_blank">Lewis &amp; Short</a> via Perseus / NEH.
      <a href="https://creativecommons.org/licenses/by-sa/3.0/" target="_blank">CC BY-SA 3.0</a>.<br>
      Text: Outler translation (1955), public domain.
    </div>
  </nav>
  <div id="nav-overlay" onclick="closeNav()"></div>
  <main id="main">
    <div id="main-header">
      <button id="hamburger" onclick="toggleNav()" aria-label="Menu"><span></span></button>
      <span id="ref-display">Confessions</span>
      <div id="mode-toggle">
        <button id="btn-english" class="mode-btn active" onclick="setMode('english')">English</button>
        <button id="btn-interlinear" class="mode-btn" onclick="setMode('interlinear')">Interlinear</button>
      </div>
      <div id="search-wrap">
        <input id="search-input" type="text" placeholder="Search…" autocomplete="off" aria-label="Search">
        <button id="search-clear" title="Clear" onclick="clearSearch()">✕</button>
        <div id="search-results"></div>
      </div>
      <button id="dark-toggle" onclick="toggleDark()" aria-label="Toggle dark mode" title="Toggle dark mode">☾</button>
    </div>
    <div id="reading-pane">
      <div id="loading" style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-faint);font-size:13px">
        Loading lexicon…
      </div>
    </div>
  </main>
  <aside id="detail">
    <div id="detail-handle"></div>
    <button id="detail-close" onclick="closeDetail()" aria-label="Close">&#10005;</button>
    <div id="detail-inner">
      <div id="detail-empty">
        <div class="empty-lat">verbum</div>
        <div>Click any word to see<br>its Latin root and<br>Lewis &amp; Short definition.</div>
      </div>
    </div>
  </aside>
</div>
<script>
// ── BOOK STRUCTURE ─────────────────────────────────────────────────────────
const BOOKS = [
  { id:1, title:'Book I',   subtitle:'Infancy and Boyhood',         chapters:20 },
  { id:2, title:'Book II',  subtitle:'Adolescent Mischief',         chapters:10 },
  { id:3, title:'Book III', subtitle:'Student Days at Carthage',    chapters:12 },
  { id:4, title:'Book IV',  subtitle:'Among the Manicheans',        chapters:16 },
  { id:5, title:'Book V',   subtitle:'Faustus and Flight to Rome',  chapters:14 },
  { id:6, title:'Book VI',  subtitle:'Milan and Monica',            chapters:16 },
  { id:7, title:'Book VII', subtitle:'The Vision of Truth',         chapters:21 },
  { id:8, title:'Book VIII',subtitle:'The Conversion',              chapters:12 },
  { id:9, title:'Book IX',  subtitle:'Death of Monica',             chapters:13 },
  { id:10,title:'Book X',   subtitle:'Memory and God',              chapters:43 },
  { id:11,title:'Book XI',  subtitle:'Time and Eternity',           chapters:31 },
  { id:12,title:'Book XII', subtitle:'Heaven and Earth',            chapters:32 },
  { id:13,title:'Book XIII',subtitle:'The Days of Creation',        chapters:38 },
];

// ── STATE ──────────────────────────────────────────────────────────────────
var LEX = {};
var bookCache = {};
var currentBook = null;
var currentChapter = null;
var selectedWordEl = null;
var currentMode = 'english';
var lexLoaded = false;

// ── LOAD LEXICON ───────────────────────────────────────────────────────────
async function loadLexicon() {
  try {
    var r = await fetch('./ls.json');
    LEX = await r.json();
    lexLoaded = true;
    console.log('Lexicon loaded:', Object.keys(LEX).length, 'entries');
    document.getElementById('reading-pane').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-faint);font-size:13px">Select a book and chapter to begin.</div>';
    loadFromHash();
  } catch(e) {
    console.warn('Lexicon load failed:', e);
    document.getElementById('reading-pane').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-faint);font-size:13px">Could not load lexicon. Check your connection.</div>';
  }
}

// ── LOAD BOOK DATA ─────────────────────────────────────────────────────────
async function loadBookData(bookId) {
  if (bookCache[bookId]) return bookCache[bookId];
  try {
    var r = await fetch('./book' + bookId + '.json');
    if (!r.ok) throw new Error('not found');
    var data = await r.json();
    bookCache[bookId] = data;
    return data;
  } catch(e) {
    return null;
  }
}

// ── RENDER BOOK LIST ───────────────────────────────────────────────────────
function renderBookList() {
  var html = '';
  BOOKS.forEach(function(b) {
    html += '<div>';
    html += '<button class="book-btn" data-book="' + b.id + '" onclick="toggleBook(this,' + b.id + ')">';
    html += b.title + ' <span style="font-weight:300;color:var(--text-faint);font-size:10px">— ' + b.subtitle + '</span>';
    html += '<span class="arrow">▶</span></button>';
    html += '<div class="ch-list" id="chl-' + b.id + '">';
    for (var c = 1; c <= b.chapters; c++) {
      html += '<button class="ch-btn" onclick="loadChapter(' + b.id + ',' + c + ')">' + c + '</button>';
    }
    html += '</div></div>';
  });
  document.getElementById('book-list').innerHTML = html;
}

function toggleBook(btn, bookId) {
  var chl = document.getElementById('chl-' + bookId);
  var isOpen = chl.classList.contains('open');
  document.querySelectorAll('.ch-list').forEach(function(el) { el.classList.remove('open'); });
  document.querySelectorAll('.book-btn').forEach(function(el) { el.classList.remove('open'); });
  if (!isOpen) { chl.classList.add('open'); btn.classList.add('open'); }
}

// ── LOAD CHAPTER ───────────────────────────────────────────────────────────
async function loadChapter(bookId, ch) {
  currentBook = bookId;
  currentChapter = ch;
  updateHash(bookId, ch);

  // Update nav
  document.querySelectorAll('.ch-btn').forEach(function(el) { el.classList.remove('active'); });
  var allChs = document.querySelectorAll('#chl-' + bookId + ' .ch-btn');
  if (allChs[ch-1]) allChs[ch-1].classList.add('active');

  var book = BOOKS.find(function(b){ return b.id === bookId; });
  document.getElementById('ref-display').textContent = book.title + ' · ' + ch;
  if (window.innerWidth <= 768) closeNav();

  // Loading state
  document.getElementById('reading-pane').innerHTML =
    '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-faint);font-size:13px">Loading…</div>';

  var bookData = await loadBookData(bookId);
  var key = bookId + '-' + ch;
  var data = bookData ? bookData[key] : null;

  if (!data) {
    document.getElementById('reading-pane').innerHTML =
      '<div style="padding:40px;color:var(--text-faint);font-family:\'Noto Serif\',serif;font-size:15px;line-height:1.8">' +
      '<p style="margin-bottom:16px;color:var(--gold);font-size:12px;letter-spacing:.08em;text-transform:uppercase">' +
      book.title + ' · Chapter ' + ch + '</p>' +
      '<p>This chapter has not yet been encoded. Book I is complete.</p>' +
      buildChapterNav(bookId, ch, book.chapters) + '</div>';
    resetDetail();
    return;
  }

  // Render
  var html = '<div class="chapter-title">' + data.title + '</div>';
  data.sections.forEach(function(sec, i) {
    if (currentMode === 'english') {
      html += '<div class="latin-heading">Latin</div>';
      html += '<div class="latin-text">' + sec.latin + '</div>';
      html += '<p class="para"><span class="para-num">' + (i+1) + '</span>';
      sec.english.forEach(function(item) {
        if (typeof item === 'string') { html += item; return; }
        if (item.l) {
          html += '<span class="ew" data-lemma="' + encodeURIComponent(item.l) + '" data-word="' + encodeURIComponent(item.w) + '" onclick="selectWord(this)">' + item.w + '</span> ';
        } else {
          html += item.w + ' ';
        }
      });
      html += '</p>';
    } else {
      html += '<div class="interlinear-para"><span class="para-num">' + (i+1) + '</span>';
      sec.english.forEach(function(item) {
        if (typeof item === 'string') return;
        var hasLat = item.l && item.l.length > 0;
        var engWord = item.w.replace(/[,;:.!?]/g,'');
        var punct = item.w.replace(engWord,'');
        html += '<span class="iw' + (hasLat ? '' : ' iw-no-lat') + '"';
        if (hasLat) html += ' data-lemma="' + encodeURIComponent(item.l) + '" data-word="' + encodeURIComponent(item.w) + '" onclick="selectWord(this)"';
        html += '>';
        html += '<span class="iw-eng">' + engWord + '<span style="color:var(--text-faint)">' + punct + '</span></span>';
        html += '<span class="iw-lat">' + (hasLat ? item.l : '—') + '</span>';
        html += '</span>';
      });
      html += '</div>';
    }
  });
  html += buildChapterNav(bookId, ch, book.chapters);
  document.getElementById('reading-pane').innerHTML = html;
  document.getElementById('reading-pane').scrollTop = 0;
  resetDetail();
}

function buildChapterNav(bookId, ch, total) {
  var prevDis = ch <= 1 ? ' disabled' : '';
  var nextDis = ch >= total ? ' disabled' : '';
  return '<div id="chapter-nav">' +
    '<button class="ch-nav-btn"' + prevDis + ' onclick="loadChapter(' + bookId + ',' + (ch-1) + ')">' +
    '<svg viewBox="0 0 7 13"><polyline points="6,1 1,6.5 6,12"/></svg>Chapter ' + (ch > 1 ? ch-1 : ch) + '</button>' +
    '<button class="ch-nav-btn"' + nextDis + ' onclick="loadChapter(' + bookId + ',' + (ch+1) + ')">' +
    'Chapter ' + (ch < total ? ch+1 : ch) + '<svg viewBox="0 0 7 13"><polyline points="1,1 6,6.5 1,12"/></svg></button>' +
    '</div>';
}

// ── WORD SELECTION ─────────────────────────────────────────────────────────
function selectWord(el) {
  // Toggle off if clicking the already-selected word
  if (selectedWordEl === el) {
    el.classList.remove('selected');
    selectedWordEl = null;
    resetDetail();
    return;
  }
  if (selectedWordEl) selectedWordEl.classList.remove('selected');
  selectedWordEl = el;
  el.classList.add('selected');

  var lemma = decodeURIComponent(el.dataset.lemma);
  var word = decodeURIComponent(el.dataset.word).replace(/[,;:.!?'"()]/g,'');
  var entry = LEX[lemma] || LEX[word.toLowerCase()];

  var html = '';
  if (entry) {
    html += '<div id="word-hero">';
    html += '<div id="hero-eng">' + word + '</div>';
    html += '<div id="hero-lat">' + lemma + '</div>';
    if (entry.p) html += '<div id="hero-pos">' + entry.p + '</div>';
    html += '</div>';
    if (entry.d) html += '<div class="dsec"><div class="dlabel">Definition</div><div class="dcontent def">' + entry.d + '</div></div>';
  } else {
    html += '<div id="word-hero">';
    html += '<div id="hero-eng">' + word + '</div>';
    html += '<div id="hero-lat">' + lemma + '</div>';
    html += '<div id="hero-pos">Latin</div>';
    html += '</div>';
    html += '<div class="dsec"><div class="dlabel">Definition</div><div class="dcontent" style="color:var(--text-faint)">No Lewis &amp; Short entry found for <em>' + lemma + '</em>.</div></div>';
  }
  document.getElementById('detail-inner').innerHTML = html;
  if (window.innerWidth <= 768) document.getElementById('detail').classList.add('open');
}

function resetDetail() {
  if (selectedWordEl) selectedWordEl.classList.remove('selected');
  selectedWordEl = null;
  document.getElementById('detail-inner').innerHTML =
    '<div id="detail-empty"><div class="empty-lat">verbum</div>' +
    '<div>Click any word to see<br>its Latin root and<br>Lewis &amp; Short definition.</div></div>';
}

// ── MODE TOGGLE ────────────────────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-english').classList.toggle('active', mode === 'english');
  document.getElementById('btn-interlinear').classList.toggle('active', mode === 'interlinear');
  if (currentBook && currentChapter) loadChapter(currentBook, currentChapter);
}

// ── SEARCH ────────────────────────────────────────────────────────────────
function setupSearch() {
  var inp = document.getElementById('search-input');
  var results = document.getElementById('search-results');
  var clear = document.getElementById('search-clear');
  var t;

  inp.addEventListener('input', function() {
    clear.classList.toggle('visible', inp.value.length > 0);
    clearTimeout(t);
    t = setTimeout(function() {
      var q = inp.value.trim().toLowerCase();
      if (q.length < 2) { results.classList.remove('open'); return; }
      doSearch(q);
    }, 250);
  });

  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') clearSearch();
  });

  // Close on outside click
  document.addEventListener('click', function(e) {
    if (!document.getElementById('search-wrap').contains(e.target))
      results.classList.remove('open');
  });
}

function doSearch(q) {
  var results = document.getElementById('search-results');
  // Search the loaded book cache
  var hits = [];
  Object.keys(bookCache).forEach(function(bookId) {
    var bookData = bookCache[bookId];
    if (!bookData) return;
    Object.keys(bookData).forEach(function(key) {
      var ch = bookData[key];
      ch.sections.forEach(function(sec) {
        // Build plain text from english words
        var text = sec.english.map(function(w) {
          return typeof w === 'string' ? w : w.w;
        }).join(' ');
        if (text.toLowerCase().indexOf(q) > -1) {
          hits.push({ key: key, title: ch.title, text: text, latin: sec.latin });
        }
      });
    });
  });

  if (hits.length === 0) {
    results.innerHTML = '<div class="sr-none">No results in loaded books. Open more books to search them.</div>';
    results.classList.add('open');
    return;
  }

  // Limit to 20
  var showing = hits.slice(0, 20);
  var html = '';
  showing.forEach(function(hit) {
    var parts = hit.key.split('-');
    var book = BOOKS.find(function(b){ return b.id == parts[0]; });
    var label = (book ? book.title : 'Book ' + parts[0]) + ' · Ch. ' + parts[1];
    // Highlight match in snippet
    var snippet = hit.text.slice(0, 120);
    var re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\]/g,'\$&') + ')', 'gi');
    snippet = snippet.replace(re, '<mark>$1</mark>');
    html += '<div class="sr-item" onclick="goToResult('' + hit.key + '')">' +
      '<div class="sr-ref">' + label + '</div>' +
      '<div class="sr-snippet">' + snippet + '</div>' +
      '</div>';
  });
  if (hits.length > 20) html += '<div class="sr-none">Showing 20 of ' + hits.length + ' results.</div>';
  results.innerHTML = html;
  results.classList.add('open');
}

function goToResult(key) {
  var parts = key.split('-');
  loadChapter(parseInt(parts[0]), parseInt(parts[1]));
  document.getElementById('search-results').classList.remove('open');
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').classList.remove('visible');
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').classList.remove('visible');
  document.getElementById('search-results').classList.remove('open');
  document.getElementById('search-input').focus();
}

// ── DARK MODE ──────────────────────────────────────────────────────────────
function toggleDark() {
  var isDark = document.body.classList.toggle('dark');
  document.documentElement.classList.toggle('dark-pre', isDark);
  document.getElementById('dark-toggle').textContent = isDark ? '☀' : '☾';
  try { localStorage.setItem('hippo-dark', isDark ? '1' : '0'); } catch(e) {}
}
(function() {
  try {
    if (localStorage.getItem('hippo-dark') === '1') {
      document.body.classList.add('dark');
      document.getElementById('dark-toggle').textContent = '☀';
    }
  } catch(e) {}
})();

// ── URL HASH ROUTING ───────────────────────────────────────────────────────
function updateHash(bookId, ch) {
  history.replaceState(null, '', '#' + bookId + '/' + ch);
}

function loadFromHash() {
  var hash = window.location.hash.replace('#','');
  if (!hash) {
    // Default: open Book I
    var btn = document.querySelector('[data-book="1"]');
    if (btn) { toggleBook(btn, 1); }
    return;
  }
  var parts = hash.split('/');
  var bookId = parseInt(parts[0]);
  var ch = parseInt(parts[1]) || 1;
  if (!bookId) return;
  var btn = document.querySelector('[data-book="' + bookId + '"]');
  if (btn) toggleBook(btn, bookId);
  loadChapter(bookId, ch);
}

// ── MOBILE ─────────────────────────────────────────────────────────────────
function toggleNav() {
  document.getElementById('nav').classList.toggle('open');
  document.getElementById('nav-overlay').classList.toggle('open');
}
function closeNav() {
  document.getElementById('nav').classList.remove('open');
  document.getElementById('nav-overlay').classList.remove('open');
}
function closeDetail() {
  document.getElementById('detail').classList.remove('open');
}
(function() {
  var det = document.getElementById('detail');
  var startY = 0;
  det.addEventListener('touchstart', function(e) { startY = e.touches[0].clientY; }, {passive:true});
  det.addEventListener('touchend', function(e) {
    if (e.changedTouches[0].clientY - startY > 60) closeDetail();
  }, {passive:true});
})();

// ── KEYBOARD NAV ───────────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (!currentBook || !currentChapter) return;
  var book = BOOKS.find(function(b){ return b.id === currentBook; });
  if (!book) return;
  if ((e.key === 'ArrowRight' || e.key === ']') && currentChapter < book.chapters)
    loadChapter(currentBook, currentChapter + 1);
  else if ((e.key === 'ArrowLeft' || e.key === '[') && currentChapter > 1)
    loadChapter(currentBook, currentChapter - 1);
});

// ── INIT ───────────────────────────────────────────────────────────────────
renderBookList();
setupSearch();
loadLexicon();
</script>
